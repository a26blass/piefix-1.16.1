name: release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
      - run: chmod +x ./gradlew
      - run: ./gradlew build -Pmod_version=${{ github.ref_name }}
      - uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar